{% extends 'mailings/base.html' %}

{% block title %}Удаление сообщения{% endblock %}

{% block content %}

<div class="container mt-5">
  <h1 class="mb-4">Удалить сообщение</h1>
  <p>Вы уверены, что хотите удалить сообщения "{{ message.subject }}"?</p>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
      <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{% url 'mailings:message_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>

{% endblock %}
