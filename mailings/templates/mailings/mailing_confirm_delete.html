{% extends 'mailings/base.html' %}

{% block title %}Удаление рассылки{% endblock %}

{% block content %}

<div class="container mt-5">
  <h1 class="mb-4">Удалить рассылку</h1>
  <p>Вы уверены, что хотите удалить рассылку "{{ mailing.message.subject }}"?</p>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
      <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{% url 'mailings:mailing_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>

{% endblock %}
