<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}MyMailings{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <nav class="navbar navbar-expand-lg border-bottom box-shadow">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'mailings:main' %}">MyMailings</a>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="p-2 btn btn-outline-primary" href="{% url 'mailings:main' %}">Главная</a>
                        <a class="p-2 btn btn-outline-primary" href="{% url 'mailings:recipient_list' %}">Получатели рассылок</a>
                        <a class="p-2 btn btn-outline-primary" href="{% url 'mailings:message_list' %}">Сообщения</a>
                        <a class="p-2 btn btn-outline-primary" href="#">Рассылки</a>
                        <a class="p-2 btn btn-outline-primary" href="#">Результаты рассылок</a>
                    </li>
                </ul>
                <form class="d-flex">
                    {% if user.is_authenticated %}
                    <a class="p-2 btn btn-outline-primary me-2" href="#">Профиль</a>
                    <form method="post" action="#">
                        {% csrf_token %}
                        <button class="p-2 btn btn-outline-primary" type="submit">Выйти</button>
                    </form>
                    {% else %}
                    <a class="p-2 btn btn-outline-primary me-2" href="#">Войти</a>
                    <a class="p-2 btn btn-outline-primary" href="#">Регистрация</a>
                    {% endif %}
                </form>
            </div>
        </div>
    </nav>
</div>
<div class="container mt-4">
    {% block content %}{% endblock %}
    <footer class="pt-4 my-md-5 pt-md-5 border-top">
        <div class="row">
            <div class="col-md">
                MyMailings
                <small class="d-block mb-3 text-muted">&copy; 2025</small>
            </div>
        </div>
    </footer>
</div>
<script src="/static/js/bootstrap.bundle.min.js"></script>
</body>
</html>
